
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floppa Haven: Caracal Pet Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #fefce8;
        }
        .floppa-bounce {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes snowfall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 1; }
            100% { transform: translateY(100vh) translateX(20px); opacity: 0; }
        }
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            animation: snowfall linear infinite;
            pointer-events: none;
            z-index: 50;
            text-shadow: 0 0 2px rgba(0,0,0,0.1);
        }
        .tv-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            animation: tv-flicker 5s infinite alternate;
        }
        @keyframes tv-flicker {
            0% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
            20% { box-shadow: 0 0 25px rgba(59, 130, 246, 0.6); }
            40% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
            60% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }
            80% { box-shadow: 0 0 22px rgba(59, 130, 246, 0.55); }
            100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        }
    </style>
